<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <meta name="description" content="Secure checkout at LaptopHub - Fast and safe payment processing."/>
    
    <title>Secure Checkout - LaptopHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { 
            background-color: #131314; 
            color: white; 
            font-family: 'Be Vietnam Pro', sans-serif;
        }
        .glass { 
            background: rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
        }
        input, select {
            background-color: rgba(31, 31, 31, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00e0ff;
            box-shadow: 0 0 10px rgba(0, 224, 255, 0.3);
        }
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .error-message {
            color: #ef4444;
            font-size: 0.875rem;
        }
        .success-message {
            color: #22c55e;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="flex justify-between items-center h-16 px-4 border-b border-white/10 bg-black/30 sticky top-0 z-40">
        <a href="index.html" class="material-symbols-outlined hover:text-[#00e0ff] transition" aria-label="Close checkout">close</a>
        <div class="font-bold text-xl text-[#b0c6ff] flex items-center gap-2">
            <span class="material-symbols-outlined">lock</span>
            Secure Checkout
        </div>
        <div class="text-green-400 flex items-center gap-1">
            <span class="material-symbols-outlined text-lg">verified</span>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 md:p-8 pb-32">
        <!-- Order Summary -->
        <section class="mb-8">
            <h2 class="text-2xl font-bold mb-4">Order Summary</h2>
            <div class="glass p-6 rounded-xl mb-4">
                <div id="cartItems" class="space-y-4">
                    <div class="text-gray-400 text-center py-8">Loading cart items...</div>
                </div>
                <div class="border-t border-white/10 pt-4 mt-4">
                    <div class="flex justify-between mb-2">
                        <span class="text-gray-400">Subtotal</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="flex justify-between mb-2">
                        <span class="text-gray-400">Shipping</span>
                        <span id="shipping">Free</span>
                    </div>
                    <div class="flex justify-between mb-2">
                        <span class="text-gray-400">Tax (18% GST)</span>
                        <span id="tax">₹0</span>
                    </div>
                    <div class="flex justify-between text-xl font-bold text-[#00e0ff] border-t border-white/10 pt-4">
                        <span>Total Amount</span>
                        <span id="total">₹0</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Checkout Form -->
        <section class="mb-8">
            <h2 class="text-2xl font-bold mb-4">Billing Information</h2>
            <form id="checkoutForm" class="glass p-6 rounded-xl space-y-4">
                <!-- Name -->
                <div>
                    <label for="fullName" class="block text-sm font-medium mb-2">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" placeholder="John Doe" required class="w-full px-4 py-3 rounded-lg">
                    <div id="fullNameError" class="error-message mt-1"></div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium mb-2">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required class="w-full px-4 py-3 rounded-lg">
                    <div id="emailError" class="error-message mt-1"></div>
                </div>

                <!-- Phone -->
                <div>
                    <label for="phone" class="block text-sm font-medium mb-2">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" required class="w-full px-4 py-3 rounded-lg">
                    <div id="phoneError" class="error-message mt-1"></div>
                </div>

                <!-- Address -->
                <div>
                    <label for="address" class="block text-sm font-medium mb-2">Street Address *</label>
                    <input type="text" id="address" name="address" placeholder="123 Main Street" required class="w-full px-4 py-3 rounded-lg">
                    <div id="addressError" class="error-message mt-1"></div>
                </div>

                <!-- City, State, Zip -->
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div>
                        <label for="city" class="block text-sm font-medium mb-2">City *</label>
                        <input type="text" id="city" name="city" placeholder="Mumbai" required class="w-full px-4 py-3 rounded-lg">
                        <div id="cityError" class="error-message mt-1"></div>
                    </div>
                    <div>
                        <label for="state" class="block text-sm font-medium mb-2">State *</label>
                        <input type="text" id="state" name="state" placeholder="Maharashtra" required class="w-full px-4 py-3 rounded-lg">
                        <div id="stateError" class="error-message mt-1"></div>
                    </div>
                    <div>
                        <label for="zip" class="block text-sm font-medium mb-2">Postal Code *</label>
                        <input type="text" id="zip" name="zip" placeholder="400001" required class="w-full px-4 py-3 rounded-lg">
                        <div id="zipError" class="error-message mt-1"></div>
                    </div>
                </div>

                <!-- Payment Method -->
                <div class="pt-4 border-t border-white/10">
                    <label class="block text-sm font-medium mb-3">Payment Method *</label>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="paymentMethod" value="upi" checked class="w-4 h-4">
                            <span>UPI (Google Pay, PhonePe, Paytm)</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="paymentMethod" value="card" class="w-4 h-4">
                            <span>Credit/Debit Card</span>
                        </label>
                        <label class="flex items-center gap-3 cursor-pointer">
                            <input type="radio" name="paymentMethod" value="netbanking" class="w-4 h-4">
                            <span>Net Banking</span>
                        </label>
                    </div>
                </div>

                <!-- Terms & Conditions -->
                <div class="pt-4 flex items-start gap-3">
                    <input type="checkbox" id="terms" name="terms" required class="w-4 h-4 mt-1">
                    <label for="terms" class="text-sm">
                        I agree to the <a href="terms.html" class="text-[#00e0ff] hover:underline" target="_blank">Terms of Service</a> and <a href="privacy.html" class="text-[#00e0ff] hover:underline" target="_blank">Privacy Policy</a> *
                    </label>
                </div>

                <div id="formError" class="error-message text-center"></div>
                <div id="formSuccess" class="success-message text-center"></div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-[#00e0ff] text-black py-4 rounded-xl font-bold text-lg hover:bg-cyan-300 transition mt-6" id="submitBtn">
                    <span class="flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">lock</span>
                        Place Order - <span id="finalTotal">₹0</span>
                    </span>
                </button>
            </form>
        </section>

        <!-- Security Info -->
        <div class="text-center text-gray-500 text-sm space-y-2">
            <p class="flex items-center justify-center gap-2">
                <span class="material-symbols-outlined text-green-400">shield_lock</span>
                Your payment information is encrypted and secure
            </p>
            <p>We accept all major payment methods and guarantee 100% transaction safety</p>
        </div>
    </main>

    <script>
        // Load cart and display items
        function loadCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartItemsDiv = document.getElementById('cartItems');

            if (cart.length === 0) {
                cartItemsDiv.innerHTML = '<div class="text-gray-400 text-center py-8">Your cart is empty. <a href="index.html" class="text-[#00e0ff] hover:underline">Continue shopping</a></div>';
                document.getElementById('submitBtn').disabled = true;
                return;
            }

            let html = '';
            let subtotal = 0;

            cart.forEach(item => {
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                html += `
                    <div class="flex justify-between items-center pb-4 border-b border-white/10">
                        <div>
                            <div class="font-medium">${item.name}</div>
                            <div class="text-gray-400 text-sm">Qty: ${item.quantity}</div>
                        </div>
                        <div class="text-right">
                            <div class="font-medium">₹${itemTotal.toLocaleString()}</div>
                            <div class="text-gray-400 text-sm">₹${item.price.toLocaleString()} each</div>
                        </div>
                    </div>
                `;
            });

            cartItemsDiv.innerHTML = html;
            updatePrices(subtotal);
        }

        function updatePrices(subtotal) {
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + tax;

            document.getElementById('subtotal').textContent = `₹${subtotal.toLocaleString()}`;
            document.getElementById('tax').textContent = `₹${tax.toLocaleString()}`;
            document.getElementById('total').textContent = `₹${total.toLocaleString()}`;
            document.getElementById('finalTotal').textContent = `₹${total.toLocaleString()}`;
        }

        // Form validation
        function validateForm() {
            const errors = {};
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const city = document.getElementById('city').value.trim();
            const state = document.getElementById('state').value.trim();
            const zip = document.getElementById('zip').value.trim();
            const terms = document.getElementById('terms').checked;

            // Clear previous errors
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');

            if (!fullName) errors.fullName = 'Full name is required';
            if (!email || !email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) errors.email = 'Valid email is required';
            if (!phone || !phone.match(/^[\d\s\+\-]{10,}$/)) errors.phone = 'Valid phone number is required';
            if (!address) errors.address = 'Address is required';
            if (!city) errors.city = 'City is required';
            if (!state) errors.state = 'State is required';
            if (!zip) errors.zip = 'Postal code is required';
            if (!terms) errors.terms = 'You must agree to terms and conditions';

            // Display errors
            for (const [field, message] of Object.entries(errors)) {
                const errorEl = document.getElementById(`${field}Error`);
                if (errorEl) errorEl.textContent = message;
            }

            return Object.keys(errors).length === 0;
        }

        // Handle form submission
        document.getElementById('checkoutForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!validateForm()) {
                document.getElementById('formError').textContent = 'Please fill all required fields correctly';
                return;
            }

            // Simulate payment processing
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="flex items-center justify-center gap-2"><span class="material-symbols-outlined animate-spin">hourglass_bottom</span> Processing...</span>';

            // Simulate API call
            setTimeout(() => {
                const formData = {
                    fullName: document.getElementById('fullName').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value,
                    city: document.getElementById('city').value,
                    state: document.getElementById('state').value,
                    zip: document.getElementById('zip').value,
                    paymentMethod: document.querySelector('input[name="paymentMethod"]:checked').value,
                    cart: JSON.parse(localStorage.getItem('cart')) || [],
                    timestamp: new Date().toISOString()
                };

                // Save order to localStorage (in production, send to backend)
                const orders = JSON.parse(localStorage.getItem('orders')) || [];
                orders.push(formData);
                localStorage.setItem('orders', JSON.stringify(orders));
                
                // Clear cart
                localStorage.removeItem('cart');

                // Show success message
                document.getElementById('formSuccess').textContent = 'Order placed successfully! Redirecting...';
                submitBtn.disabled = true;
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    window.location.href = 'order-confirmation.html';
                }, 2000);
            }, 2000);
        });

        // Load cart on page load
        window.addEventListener('load', loadCart);
    </script>
</body>
</html>
